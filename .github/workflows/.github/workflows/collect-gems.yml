name: Collect Wizardry Free Gems

on:
  schedule:
    - cron: "0 11 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  collect-gems:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run gem collector
        env:
          WIZARDRY_USER_ID: ${{ secrets.WIZARDRY_USER_ID }}
        run: |
          if [ -z "$WIZARDRY_USER_ID" ]; then
            echo "::error::WIZARDRY_USER_ID secret is not set."
            exit 1
          fi

          python main.py "$WIZARDRY_USER_ID"
