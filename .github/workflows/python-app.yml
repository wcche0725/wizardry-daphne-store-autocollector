# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python application

on:
  schedule:
    - cron: "0 11 * * 1"
  workflow_dispatch:
    inputs:
      user_id:
        description: "Wizardry user ID (overrides WIZARDRY_USER_ID secret for this run)"
        required: false
        type: string

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: pip install -r requirements.txt
    - name: Run autocollector
      env:
        WIZARDRY_USER_ID: ${{ inputs.user_id || secrets.WIZARDRY_USER_ID }}
      run: |
        if [ -z "$WIZARDRY_USER_ID" ]; then
          echo "::error::WIZARDRY_USER_ID is empty. Set the repository secret WIZARDRY_USER_ID or pass user_id when dispatching."
          exit 1
        fi
        python main.py "$WIZARDRY_USER_ID"
