# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python application

on:
  schedule:
    - cron: "0 11 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Set up Python 3.10
      uses: actions/setup-python@v6
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: pip install -r requirements.txt
    - name: Run autocollector
      env:
        WIZARDRY_USER_ID: ${{ secrets.WIZARDRY_USER_ID }}
      run: |
        if [ -z "$WIZARDRY_USER_ID" ]; then
          echo "::error::WIZARDRY_USER_ID secret is not set. Add it under Settings → Secrets and variables → Actions before running this workflow."
          exit 1
        fi
        python main.py "$WIZARDRY_USER_ID"
